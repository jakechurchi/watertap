[pytest]
addopts = --durations=10
          --cov-config=.coveragerc
testpaths = watertap
log_file = pytest.log
log_file_date_format = %Y-%m-%dT%H:%M:%S
log_file_format = %(asctime)s %(levelname)-7s <%(filename)s:%(lineno)d> %(message)s
log_file_level = INFO
filterwarnings =
    error
    # see IDAES/idaes-pse#1549
   ignore:unclosed file .*Visualization-data.*SA-.*\.bin:ResourceWarning
   # emitted sporadically during nbmake tests
   ignore:unclosed <socket\.socket .*>:ResourceWarning
   ignore:unclosed event loop .*:ResourceWarning
markers =
    unit: Quick tests that do not require a solver, must run in < 2 s
    component: Quick tests that may require a solver
    integration: Long duration tests
    build: FIXME for building stuff?
    solver: Tests that require a solver
    requires_idaes_solver: Tests that require a solver from the IDEAS extensions to pass